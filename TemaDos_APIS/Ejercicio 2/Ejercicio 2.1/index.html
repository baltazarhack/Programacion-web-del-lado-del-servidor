<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Receta</title>
    <style>
      .card {
        border: 2px solid #2ecc71;
        border-radius: 10px;
        padding: 20px;
        width: 300px;
        font-family: sans-serif;
      }
      .precio {
        color: #e67e22;
        font-weight: bold;
        font-size: 1.2em;
      }
      ul {
        padding-left: 20px;
      }
    </style>
  </head>
  <body>
    <div id="taco-card" class="card">
      <h1 id="taco-nombre">Cargando...</h1>
      <p class="precio">Precio: <span id="taco-precio">0</span></p>
      <h3>Acompañamientos:</h3>
      <ul id="lista-acompañamientos"></ul>
    </div>

    <script>
      const taco = {
        id: "0001",
        tipo: "taco",
        nombre: "Taco lechon",
        precio: 20.0,
        ingredientes: {
          proteina: {
            nombre: "Puerco",
            preparacion: "Horneado",
          },
          salsa: {
            nombre: "Tomate verde",
            picor: "Medio",
          },
          acompañamientos: [
            {
              nombre: "Cebolla",
              cantidad: "1 cucharada",
              ingredientes: ["Cebolla blanca", "Cilantro", "Naranja", "Sal"],
            },
            {
              nombre: "Guacamole",
              cantidad: "2 cucharadas",
              ingredientes: [
                "Aguacate",
                "Jugo de limon",
                "Sal",
                "Cebolla",
                "Cilantro",
              ],
            },
          ],
        },
      };

      // TU CÓDIGO AQUÍ:
      // 1. Insertar nombre en el h1
      const TacoNombre = document.getElementById('taco-nombre')
      TacoNombre.textContent = taco.nombre;
      // 2. Insertar precio con formato moneda
      const TacoPrecio = document.getElementById('taco-precio')
      TacoPrecio.textContent = taco.precio.toLocaleString("es-MX", {
        style: "currency",
        currency: "MXN"
      });
      // 3. Recorrer acompañamientos y crear <li> para cada uno
        const lista  = document.getElementById('lista-acompañamientos')
        taco.ingredientes.acompañamientos.forEach((acompañamiento) => {
            const li = document.createElement('li')
            li.textContent = (`${acompañamiento.nombre} (${acompañamiento.cantidad})`)
            lista.appendChild(li)
        })
    </script>
  </body>
</html>
